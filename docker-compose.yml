version: "3.9"

services:
  grandnode:
    build: .
    container_name: grandnode-cn
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - GRANDNODE_MongoDBConnection=mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-changeme}@mongo:27017/grandnode?authSource=admin
      - GRANDNODE_InstalledPlugins=Payments.Alipay;Payments.WeChatPay;Shipping.CN
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - gn_data:/app/App_Data
    networks:
      - gn-net

  mongo:
    image: mongo:7
    container_name: grandnode-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-changeme}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gn-net

  nginx:
    image: nginx:alpine
    container_name: grandnode-nginx
    ports:
      - "${GRANDNODE_PORT:-8080}:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - grandnode
    restart: unless-stopped
    networks:
      - gn-net

volumes:
  gn_data:
  mongo_data:

networks:
  gn-net:
    driver: bridge
