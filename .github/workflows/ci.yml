name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker compose build --no-cache
      - name: Verify compose config
        run: docker compose config --quiet

  lint-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts

  validate-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate locale JSON
        run: python3 -m json.tool locales/zh-CN.json > /dev/null
      - name: Validate plugin config
        run: python3 -m json.tool plugins/plugin-config.json > /dev/null
